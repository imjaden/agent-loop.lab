let activeLayer = 0;

function render() {
  const grid = document.getElementById('matrix');
  const tabs = document.querySelectorAll('.tab');
  const desc = document.getElementById('layerDesc');
  tabs.forEach((t,i) => t.classList.toggle('active', i===activeLayer));
  grid.innerHTML = '';

  if (activeLayer === 0) {
    // ── Layer 0: Unified history table ──
    desc.textContent = '各战场跨年代发展全貌·点击项目名查看 GitHub';
    const wrap = document.createElement('div');
    wrap.className = 'hist-wrap';
    let html = `<table class="hist-table"><thead><tr>`;
    HIST_COLS.forEach(c => html += `<th>${c}</th>`);
    html += `</tr></thead><tbody>`;
    HIST_DATA.forEach(row => {
      html += `<tr><td class="row-time">${row.t}</td>`;
      row.cells.forEach(cell => {
        html += `<td><div class="hist-cell">${cell || '—'}</div></td>`;
      });
      html += `</tr>`;
    });
    html += `</tbody></table>`;
    wrap.innerHTML = html;
    grid.appendChild(wrap);

  } else {
    // ── Layers 1-3: per-battlefield cards ──
    const layer = LAYER_DATA[activeLayer - 1];
    desc.textContent = layer.desc;

    KEYS.forEach((key, idx) => {
      const item = layer.data[key];
      if (!item) return;
      const summary = item.summary || '';
      let detailHTML = '';

      if (item.detail && item.detail.length > 0 && item.detail[0][0] === '') {
        // Comparison table (PY vs TS)
        const rows = item.detail.slice(1);
        detailHTML = `<table><tr><th>维度</th><th>🐍 Python</th><th>📘 TypeScript</th></tr>`;
        rows.forEach(r => detailHTML += `<tr><td><strong>${linkify(r[0])}</strong></td><td>${linkify(r[1])}</td><td>${linkify(r[2])}</td></tr>`);
        detailHTML += '</table>';
      } else if (activeLayer === 2) {
        // Erosion cases
        detailHTML = `<table><tr><th>方向</th><th>案例</th><th>说明</th></tr>`;
        item.detail.forEach(r => {
          const dir = r[0].includes('→') ? (r[0].startsWith('TS')?'tag-ts':r[0].startsWith('PY')?'tag-py':'tag-both') : 'tag-draw';
          detailHTML += `<tr><td><span class="${dir}" style="padding:2px 6px;border-radius:3px;font-size:11px">${r[0]}</span></td><td><strong>${linkify(r[1])}</strong></td><td>${linkify(r[2])}</td></tr>`;
        });
        detailHTML += '</table>';
      } else {
        // Trends
        detailHTML = `<table><tr><th>判断</th><th>结论</th><th>依据</th></tr>`;
        item.detail.forEach(r => {
          const cls = r[0].includes('胜') ? 'tag-win-ts' : r[0].includes('守')||r[0].includes('定') ? 'tag-win-py' : 'tag-both';
          detailHTML += `<tr><td><span class="${cls}" style="padding:2px 6px;border-radius:3px;font-size:11px">${r[0]}</span></td><td><strong>${linkify(r[1])}</strong></td><td>${linkify(r[2])}</td></tr>`;
        });
        detailHTML += '</table>';
      }

      const card = document.createElement('div');
      card.className = 'card open';
      card.innerHTML = `
        <div class="card-header" onclick="toggleCard(this)">
          <div class="card-index" style="background:var(--bg4)">${IDX[idx]}</div>
          <div class="card-label">${ICONS[key]} ${LABELS[key]}</div>
          <span class="card-tag ${item.tag}">${item.tagText}</span>
          <span class="card-arrow">▶</span>
        </div>
        <div class="card-body">
          <div style="font-size:13px;font-weight:600;color:var(--accent);margin:8px 0 4px">${summary}</div>
          ${detailHTML}
        </div>`;
      grid.appendChild(card);
    });
  }
}

function toggleCard(header) {
  header.parentElement.classList.toggle('open');
}

document.getElementById('tabs').addEventListener('click', (e) => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  activeLayer = parseInt(tab.dataset.layer);
  render();
});

render();
</script>
</body>
</html>
